<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Peer Class</title>
  </head>
  <body>
    <h1>Demo Of Form</h1>
    <form>
      <label>Your Name:</label>
      <input type="text" />
      <br /><br />
      <label>College Email:</label>
      <input type="email" />
      <input type="button" value="Button" />
    </form>

    <h1>Form Using GET method</h1>
    <form action="" method="GET">
      <label for="firstName">Enter Name:</label>
      <input type="text" id="firstName" name="first_name" />
      <br /><br />
      <label for="favFood">Favorite Food:</label>
      <input type="text" id="favFood" name="favorite_food" />
      <br /><br />
      <button type="submit">Submit</button>
    </form>

    <h1>Different values of type attribute in input tags</h1>
    <form action="" method="POST">
      <label>First Name:</label>
      <input type="text" />
      <br /><br />

      <label>Last Name:</label>
      <input type="text" />
      <br /><br />

      <label>Check here if you require on-campus housing:</label>
      <input type="checkbox" />
      <br /><br />

      <label>Choose a theme color for your student profile:</label>
      <input type="color" />
      <br /><br />

      <label>Date of Birth:</label>
      <input type="date" />
      <br /><br />

      <label>Preferred Interview Date and Time:</label>
      <input type="datetime-local" />
      <br /><br />

      <label>Personal Email Address:</label>
      <input type="email" />
      <br /><br />

      <label>Upload 12th Marksheet(PDF):</label>
      <input type="file" />
      <br /><br />

      <label>Click the button to submit your application:</label>
      <input
        type="image"
        src="ImageButton.jpg"
        alt="Submit"
        width="100"
        height="50"
      />
      <br /><br />

      <label>Expected Graduation Month and Year:</label>
      <input type="month" />
      <br /><br />

      <label>12th Marks(out of 100): </label>
      <input type="number" />
      <br /><br />

      <label>Create a Portal Password:</label>
      <input type="password" />
      <br /><br />

      <label>Applying for Undergraduate Degree:</label>
      <input type="radio" name="radio" />
      <br /><br />

      <label>Applying for Postgraduate Degree:</label>
      <input type="radio" name="radio" />
      <br /><br />

      <label>Rate your interest in Undergraduate Research (Low to High):</label>
      <input type="range" />
      <br /><br />

      <label>Clear all form entries:</label>
      <input type="reset" />
      <br /><br />

      <label>Name of your High School:</label>
      <input type="search" />
      <br /><br />

      <label>Click to Submit your application:</label>
      <input type="submit" />
      <br /><br />

      <label>Mobile Phone Number:</label>
      <input type="tel" />
      <br /><br />

      <label>Exact Finish Time (Hours and Minutes):</label>
      <input type="time" name="exact_time" />
      <br /><br />

      <label>Preferred Orientation Week:</label>
      <input type="week" />
      <br /><br />

      <label>Click to Submit your application:</label>
      <input type="button" value="Button" />
      <br /><br />
    </form>

    <form action="" method="POST">
      <input type="text" value="User ID: 12345" readonly />
      <br /><br />

      <input type="text" value="You can't touch this" disabled />
      <br /><br />

      <label>Enter Text:</label>
      <input type="text" size="5" />
      <br /><br />

      <label>Enter Text:</label>
      <input type="text" maxlength="10" />
      <br /><br />

      <label>Choose Your Favourite Number(between 1 - 5):</label>
      <input type="number" name="vote_count" step="5" />
      <br /><br />

      <label>Mobile Phone Number:</label>
      <input type="tel" pattern="[0-9]{10}" />
      <br /><br />
      <input type="submit" value="Submit" />

      <label>Enter your Name: </label>
      <input type="text" placeholder="Enter your name" required />
      <br /><br />

      <label>Exact Finish Time (Hours, Minutes, and Seconds):</label>
      <input type="time" name="exact_time" step="1" />
      <input
        type="image"
        src="ImageButton.jpg"
        alt="Submit"
        width="100"
        height="50"
      />
    </form>
  </body>
</html>
